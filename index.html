<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventory Variance Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon"><i class="bi bi-box-seam"></i></div>
        <div><h5>Inventory</h5><span>Variance Portal</span></div>
      </div>
      <nav class="nav-menu">
        <button class="nav-link active" data-filter="all"><i class="bi bi-grid-1x2"></i> All Links</button>
        <div id="categoryMenu"></div>
      </nav>
      <div class="sidebar-footer"><small>© 2026 MN Solutions
Built with Google Apps Script</small></div>
    </aside>
    <main class="main-content">
      <section class="hero">
        <div>
          <span class="hero-pill"><i class="bi bi-cloud-check"></i> Shared Team Portal</span>
          <h1>Inventory Variance Portal</h1>
          <p>One place para sa lahat ng variance-related Google Sheets.</p>
        </div>
        <div class="hero-actions">
          <button class="btn btn-light rounded-pill px-3" id="refreshBtn"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
          <button class="btn btn-light rounded-pill px-3" id="darkModeBtn"><i class="bi bi-moon-stars"></i> Dark</button>
        </div>
      </section>
      <section class="stats-grid">
        <div class="stat-card"><span>Total Links</span><strong id="totalLinks">0</strong></div>
        <div class="stat-card"><span>Active Links</span><strong id="activeLinks">0</strong></div>
        <div class="stat-card"><span>Categories</span><strong id="totalCategories">0</strong></div>
        <div class="stat-card"><span>Last Loaded</span><strong id="lastLoaded">--</strong></div>
      </section>
      <section class="toolbar">
        <div class="search-wrap"><i class="bi bi-search"></i><input type="search" id="searchInput" placeholder="Search sheet, category, description..."></div>
      </section>
      <section id="statusMessage"></section>
      <section id="cardsContainer" class="cards-area"></section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
